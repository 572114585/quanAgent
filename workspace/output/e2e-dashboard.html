<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>Dashboard E2E</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root {
  --primary: oklch(0.62 0.19 255);
  --bg: oklch(0.15 0.02 260);
  --surface: oklch(0.21 0.02 260);
  --border: oklch(0.30 0.02 260);
  --text: oklch(0.96 0.005 260);
  --muted: oklch(0.70 0.01 260);
  --green: oklch(0.70 0.15 145);
  --red: oklch(0.65 0.20 25);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); padding: 48px 64px; }
header { margin-bottom: 40px; }
h1 { font-size: 42px; font-weight: 700; letter-spacing: -0.02em; }
.subtitle { color: var(--muted); font-size: 16px; margin-top: 8px; font-family: 'JetBrains Mono', monospace; }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; }
.stat .label { color: var(--muted); font-size: 13px; font-family: 'JetBrains Mono', monospace; margin-bottom: 12px; }
.stat .value { font-size: 36px; font-weight: 700; }
.stat .delta { font-size: 13px; margin-top: 8px; font-family: 'JetBrains Mono', monospace; }
.up { color: var(--green); }
.down { color: var(--red); }
.charts { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
.chart-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; }
.chart-box h2 { font-size: 18px; margin-bottom: 20px; }
canvas { max-height: 320px; }
</style>
</head>
<body>
<header>
  <h1>Revenue Overview</h1>
  <div class="subtitle">Q2 2026 · updated just now</div>
</header>
<div class="stats">
  <div class="stat"><div class="label">MRR</div><div class="value">$48.2k</div><div class="delta up">↑ 12.4%</div></div>
  <div class="stat"><div class="label">Active Users</div><div class="value">3,841</div><div class="delta up">↑ 8.1%</div></div>
  <div class="stat"><div class="label">Churn</div><div class="value">2.1%</div><div class="delta down">↓ 0.4%</div></div>
  <div class="stat"><div class="label">NRR</div><div class="value">118%</div><div class="delta up">↑ 3.2%</div></div>
</div>
<div class="charts">
  <div class="chart-box"><h2>Monthly Recurring Revenue</h2><canvas id="line"></canvas></div>
  <div class="chart-box"><h2>Plan Distribution</h2><canvas id="doughnut"></canvas></div>
</div>
<script>
const css = getComputedStyle(document.documentElement);
const primary = css.getPropertyValue('--primary').trim() || '#5b7cfa';
const green = css.getPropertyValue('--green').trim() || '#34d399';
const muted = css.getPropertyValue('--muted').trim() || '#8b8da8';
new Chart(document.getElementById('line'), {
  type: 'line',
  data: {
    labels: ['Jan','Feb','Mar','Apr','May','Jun'],
    datasets: [{
      label: 'MRR',
      data: [32, 35, 39, 42, 45, 48.2],
      borderColor: primary,
      backgroundColor: primary + '22',
      tension: 0.4, fill: true, borderWidth: 2,
      pointBackgroundColor: primary, pointRadius: 4
    }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { grid: { color: '#ffffff10' }, ticks: { color: muted } },
      y: { grid: { color: '#ffffff10' }, ticks: { color: muted, callback: v => '$'+v+'k' } }
    }
  }
});
new Chart(document.getElementById('doughnut'), {
  type: 'doughnut',
  data: {
    labels: ['Pro', 'Team', 'Enterprise'],
    datasets: [{
      data: [45, 30, 25],
      backgroundColor: [primary, green, '#fbbf24'],
      borderWidth: 0
    }]
  },
  options: { responsive: true, maintainAspectRatio: false, cutout: '68%', plugins: { legend: { position: 'bottom', labels: { color: muted } } } }
});
</script>
</body>
</html>
